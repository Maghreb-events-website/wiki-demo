site_name: Maghreb Events Wiki
site_description: Documentation for Maghreb Events
site_url: https://maghreb-events-website.github.io/mk-docs-wiki-demo/

theme:
  name: material

  palette:
    scheme: slate  

    primary: red
    accent: white

    toggle:
      icon: material/brightness-4
      name: Switch theme

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Setup: guide/setup.md
      - Deployment: guide/deployment.md
  - API: api.md